services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: banking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  app-backend:
    build: ./backend
    environment:
      DB_HOST: postgres
      DB_NAME: banking_db
      DB_USER: postgres
      DB_PASS: postgres
      REDIS_HOST: redis
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      APP_SECURITY_AUTH_WHITELIST: "/api/v1/auth/**,/public/**"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"

  app-frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - app-backend
